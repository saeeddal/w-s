<button
  class="uk button"
  [class.disabled]="isDisabled"
  [ngClass]="[
    'uk-button-bg-color-' + bgColor,
    'uk-button-fg-color-' + fgColor,
    'uk-button-display-' + display,
    'uk-button-border-color-' + borderColor,
    'uk-button-padding-' + padding,
    'uk-button-cursor-' + cursor,
    'uk-button-height-' + height,
    'uk-button-uk-type-' + ukType,
  ]"
  [ngStyle]="{ 'border-radius.px': borderRadius }"
  [type]="buttonType"
>
  <div class="start-wrapper">
    <ng-content select="[START]" />
  </div>
  <!-- [fgColor]="isDisabled ? UK_TYPE.LABEL.FG_COLOR.CONTENT_DISABLED : fgColor" -->
  <pt-label
    [fgColor]="isDisabled ? UK_TYPE.LABEL.FG_COLOR.BASE_TONAL : fgColor"
    [horizontalAlignment]="horizontalAlignment"
    [size]="labelSize"
    [verticalAlignment]="'CENTER'"
    [weight]="labelWeight"
  >
    <ng-content />
  </pt-label>
  <div class="end-wrapper">
    <ng-content select="[END]" />
  </div>
</button>
